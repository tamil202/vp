<footer class="footer">
  <div class="footer-glow" aria-hidden="true"></div>

  <!-- 5 floating Angular icons -->
  <div class="ng-floats" aria-hidden="true">
    <svg class="ng-icon ng-1" viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
      <polygon points="125,3 238,43 218,196 125,248 32,196 12,43" fill="#dd0031"/>
      <polygon points="125,3 125,248 218,196 238,43" fill="#c3002f"/>
      <path d="M125 30l-78 175h29l15-37h68l15 37h29L125 30zm0 53l25 58H100l25-58z" fill="white"/>
    </svg>
    <svg class="ng-icon ng-2" viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
      <polygon points="125,3 238,43 218,196 125,248 32,196 12,43" fill="#dd0031"/>
      <polygon points="125,3 125,248 218,196 238,43" fill="#c3002f"/>
      <path d="M125 30l-78 175h29l15-37h68l15 37h29L125 30zm0 53l25 58H100l25-58z" fill="white"/>
    </svg>
    <svg class="ng-icon ng-3" viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
      <polygon points="125,3 238,43 218,196 125,248 32,196 12,43" fill="#dd0031"/>
      <polygon points="125,3 125,248 218,196 238,43" fill="#c3002f"/>
      <path d="M125 30l-78 175h29l15-37h68l15 37h29L125 30zm0 53l25 58H100l25-58z" fill="white"/>
    </svg>
    <svg class="ng-icon ng-4" viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
      <polygon points="125,3 238,43 218,196 125,248 32,196 12,43" fill="#dd0031"/>
      <polygon points="125,3 125,248 218,196 238,43" fill="#c3002f"/>
      <path d="M125 30l-78 175h29l15-37h68l15 37h29L125 30zm0 53l25 58H100l25-58z" fill="white"/>
    </svg>
    <svg class="ng-icon ng-5" viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
      <polygon points="125,3 238,43 218,196 125,248 32,196 12,43" fill="#dd0031"/>
      <polygon points="125,3 125,248 218,196 238,43" fill="#c3002f"/>
      <path d="M125 30l-78 175h29l15-37h68l15 37h29L125 30zm0 53l25 58H100l25-58z" fill="white"/>
    </svg>
  </div>

  <div class="footer-inner">
    <!-- Top row -->
    <div class="footer-top">
      <div class="footer-brand">
        <div class="footer-logo">VP</div>
        <div class="footer-brand-info">
          <span class="footer-name">Vishnuprabha</span>
          <span class="footer-title-label">Software Engineer · Tamil Nadu, India</span>
        </div>
      </div>

      <nav class="footer-nav">
        @for (link of navLinks; track link) {
          <a (click)="scrollTo(link)" class="footer-link">{{ link }}</a>
        }
      </nav>
    </div>

    <!-- Divider -->
    <div class="footer-divider"></div>

    <!-- Bottom row -->
    <div class="footer-bottom">
      <span class="footer-copy">
        © {{ year }} Vishnuprabha. Built with
        <svg class="footer-angular-icon" viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg" width="18" height="18" aria-label="Angular">
          <polygon points="125,3 238,43 218,196 125,248 32,196 12,43" fill="#dd0031"/>
          <polygon points="125,3 125,248 218,196 238,43" fill="#c3002f"/>
          <path d="M125 30l-78 175h29l15-37h68l15 37h29L125 30zm0 53l25 58H100l25-58z" fill="white"/>
        </svg>
        Angular
      </span>

      <button class="scroll-top-btn" (click)="scrollToTop()" aria-label="Back to top">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
    </div>
  </div>
</footer>
