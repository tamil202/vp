<section id="experience" class="exp-section">
  <div class="exp-bg" aria-hidden="true">
    <div class="exp-orb exp-orb-1"></div>
    <div class="exp-orb exp-orb-2"></div>
  </div>

  <!-- Header -->
  <div class="exp-header">
    <div class="reveal">
      <span class="section-tag">My Journey</span>
      <h2 class="section-title">Work <span class="gradient-text">Experience</span></h2>
      <div class="section-divider center"></div>
    </div>
  </div>

  <!-- Timeline -->
  <div class="timeline-wrap">
    <div class="timeline-line">
      <div class="timeline-line-fill"></div>
    </div>

    @for (exp of experiences; track $index) {
      <div class="timeline-item"
           [class.left]="$index % 2 === 0"
           [class.right]="$index % 2 !== 0"
           [class.reveal-left]="$index % 2 === 0"
           [class.reveal-right]="$index % 2 !== 0"
           [style.transitionDelay]="($index * 0.15) + 's'">

        <!-- Timeline dot -->
        <div class="timeline-dot" [style.background]="exp.color" [style.boxShadow]="'0 0 0 6px ' + exp.color + '22, 0 0 20px ' + exp.color + '44'">
          <div class="dot-pulse" [style.background]="exp.color"></div>
        </div>

        <!-- Card -->
        <div class="exp-card">
          <!-- Top: period + type -->
          <div class="exp-card-top">
            <span class="exp-period" [style.color]="exp.color">{{ exp.period }}</span>
            <span class="exp-type">{{ exp.type }}</span>
          </div>

          <!-- Role -->
          <h3 class="exp-role">{{ exp.role }}</h3>
          <div class="exp-company">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            {{ exp.company }}
          </div>

          <!-- Divider -->
          <div class="exp-divider" [style.background]="'linear-gradient(90deg,' + exp.color + ', transparent)'"></div>

          <!-- Points -->
          <ul class="exp-points">
            @for (point of exp.points; track $index) {
              <li>
                <span class="point-dot" [style.background]="exp.color"></span>
                {{ point }}
              </li>
            }
          </ul>

          <!-- Tech tags -->
          <div class="exp-techs">
            @for (tech of exp.techs; track tech) {
              <span class="exp-tech" [style.borderColor]="exp.color + '44'" [style.color]="exp.color">{{ tech }}</span>
            }
          </div>
        </div>
      </div>
    }
  </div>
</section>
